  <script>

    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/Graphic",
      "esri/layers/GraphicsLayer"
    ], function (Map, MapView, Graphic, GraphicsLayer) {

      const droneLayer = new GraphicsLayer()
      const pathLayer = new GraphicsLayer()

      const waypointLayer = new GraphicsLayer()
      const planningLayer = new GraphicsLayer()

      const missionLayer = new GraphicsLayer()

      const map = new Map({
        basemap: "satellite",
        layers: [
          missionLayer,
          planningLayer,
          pathLayer,
          waypointLayer,
          droneLayer
        ]
      })

      const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [72.8777, 19.0760],
        zoom: 15
      })

      let pathPoints = []
      let missionPoints = []
      let planningMode = false

      // --------------------
      // DRONE PATH (CYAN)
      // --------------------

      window.updateDronePosition = function (lat, lon) {

        const point = {
          type: "point",
          longitude: lon,
          latitude: lat
        }

        pathPoints.push(point)

        droneLayer.removeAll()
        pathLayer.removeAll()

        droneLayer.add(new Graphic({
          geometry: point,
          symbol: {
            type: "simple-marker",
            color: "white",
            size: "10px"
          }
        }))

        if (pathPoints.length > 1) {

          pathLayer.add(new Graphic({
            geometry: {
              type: "polyline",
              paths: [pathPoints.map(p => [p.longitude, p.latitude])]
            },
            symbol: {
              type: "simple-line",
              color: "cyan",
              width: 2
            }
          }))

        }

      }

      // --------------------
      // ENABLE PLANNING
      // --------------------

      window.enableMissionPlanning = function () {

        planningMode = true

        missionPoints = []

        waypointLayer.removeAll()
        planningLayer.removeAll()

      }

      // --------------------
      // CLICK → ADD WAYPOINT
      // --------------------

      view.on("click", function (event) {

        if (!planningMode)
          return

        const lon = event.mapPoint.longitude
        const lat = event.mapPoint.latitude
        const index = missionPoints.length

        const point = {
          type: "point",
          longitude: lon,
          latitude: lat
        }

        missionPoints.push(point)

        // waypoint marker
        waypointLayer.add(new Graphic({
          geometry: point,
          symbol: {
            type: "picture-marker",
            url: "https://static.arcgis.com/images/Symbols/Shapes/BluePin1LargeB.png",
            width: "24px",
            height: "24px"
          }
        }))

        waypointLayer.add(new Graphic({
          geometry: point,
          symbol: {
            type: "text",
            text: index.toString(),
            color: "white",
            font: {
              size: 10,
              weight: "bold"
            },
            yoffset: 8
          }
        }))

        // draw temporary planning line
        planningLayer.removeAll()

        if (missionPoints.length > 1) {

          planningLayer.add(new Graphic({
            geometry: {
              type: "polyline",
              paths: [missionPoints.map(p => [p.longitude, p.latitude])]
            },
            symbol: {
              type: "simple-line",
              color: "yellow",
              width: 3
            }
          }))

        }

      })

      // --------------------
      // UPLOAD MISSION
      // --------------------

      window.uploadMission = function () {

        planningMode = false

        planningLayer.removeAll()
        missionLayer.removeAll()

        if (missionPoints.length < 2)
          return

        missionLayer.add(new Graphic({
          geometry: {
            type: "polyline",
            paths: [missionPoints.map(p => [p.longitude, p.latitude])]
          },
          symbol: {
            type: "simple-line",
            color: "red",
            width: 3
          }
        }))

      }

    })

  </script>
