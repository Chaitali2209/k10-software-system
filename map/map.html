<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8"/>

<link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
<script src="https://js.arcgis.com/4.29/"></script>

<style>
html, body, #viewDiv{
margin:0;
padding:0;
height:100%;
width:100%;
}
</style>

</head>

<body>

<div id="viewDiv"></div>

<script>

require([
"esri/Map",
"esri/views/MapView",
"esri/Graphic",
"esri/layers/GraphicsLayer"
], function(Map, MapView, Graphic, GraphicsLayer) {

const droneLayer = new GraphicsLayer()
const pathLayer = new GraphicsLayer()
const waypointLayer = new GraphicsLayer()
const planningLayer = new GraphicsLayer()
const missionLayer = new GraphicsLayer()

const map = new Map({
basemap:"satellite",
layers:[
missionLayer,
planningLayer,
pathLayer,
waypointLayer,
droneLayer
]
})

const view = new MapView({
container:"viewDiv",
map:map,
center:[72.8777,19.0760],
zoom:15
})

let pathPoints=[]
let missionPoints=[]
let planningMode=false
let missionLocked=false 
let draggingGraphic=null

// --------------------
// DRONE POSITION
// --------------------

window.updateDronePosition=function(lat,lon){

const point={
type:"point",
longitude:lon,
latitude:lat
}

pathPoints.push(point)

droneLayer.removeAll()
pathLayer.removeAll()

droneLayer.add(new Graphic({
geometry:point,
symbol:{
type:"simple-marker",
color:"white",
size:"10px"
}
}))

if(pathPoints.length>1){

pathLayer.add(new Graphic({
geometry:{
type:"polyline",
paths:[pathPoints.map(p=>[p.longitude,p.latitude])]
},
symbol:{
type:"simple-line",
color:"cyan",
width:2
}
}))

}

}

// --------------------
// ENABLE PLANNING
// --------------------

window.enableMissionPlanning=function(){

planningMode=true
missionLocked = false 
missionPoints=[]

waypointLayer.removeAll()
planningLayer.removeAll()

}

// --------------------
// CLEAR MISSION
// --------------------
window.clearMission=function(){

missionPoints=[]
planningMode=false

waypointLayer.removeAll()
planningLayer.removeAll()
missionLayer.removeAll()

}

// --------------------
// cLEAR PATH
// --------------------
window.clearPath=function(){

pathPoints=[]

pathLayer.removeAll()
droneLayer.removeAll()

}

// --------------------
// ADD WAYPOINT
// --------------------

view.on("click",function(event){

if(!planningMode || missionLocked) return

const lon=event.mapPoint.longitude
const lat=event.mapPoint.latitude

const point={
type:"point",
longitude:lon,
latitude:lat
}

missionPoints.push(point)

drawWaypoints()
drawPlanningLine()

})

// --------------------
// DRAG WAYPOINT
// --------------------

view.on("pointer-down", function(event){

  view.hitTest(event).then(function(response){

    const results = response.results.filter(r => r.graphic.layer === waypointLayer)

    if(results.length > 0){

      draggingGraphic = results[0].graphic
      view.container.style.cursor = "grabbing"

    }

  })

})


view.on("drag", function(event){

  if(!draggingGraphic || !planningMode) return

  // stop map navigation
  event.stopPropagation()

  const mapPoint = view.toMap({
    x: event.x,
    y: event.y
  })

  const index = draggingGraphic.attributes.index

  missionPoints[index] = {
  type:"point",
  longitude:mapPoint.longitude,
  latitude:mapPoint.latitude
  }

  // redraw markers and numbers
  drawWaypoints()
  drawPlanningLine()

  // update dragging reference
  draggingGraphic = waypointLayer.graphics.items[index*2]

})


view.on("pointer-up", function(){

  draggingGraphic = null
  view.container.style.cursor = "default"

})
// --------------------
// RIGHT CLICK DELETE
// --------------------

view.on("immediate-click",function(event){

if(event.button!==2) return

if(!planningMode) return

event.stopPropagation()


view.hitTest(event).then(function(response){

const results=response.results.filter(r=>r.graphic.layer===waypointLayer)

if(results.length>0){

const graphic=results[0].graphic
const index=graphic.attributes.index

missionPoints.splice(index,1)

drawWaypoints()
if(planningMode){
  drawPlanningLine()
}else{
  missionLayer.removeAll()

  missionLayer.add(new Graphic({
    geometry:{
      type:"polyline",
      paths:[missionPoints.map(p=>[p.longitude,p.latitude])]
    },
    symbol:{
      type:"simple-line",
      color:"red",
      width:3
    }
  }))
}

}

})

})

// --------------------
// DRAW WAYPOINTS
// --------------------

function drawWaypoints(){

waypointLayer.removeAll()

missionPoints.forEach((point,index)=>{

waypointLayer.add(new Graphic({
geometry:point,
attributes:{index:index},
symbol:{
type:"picture-marker",
url:"https://static.arcgis.com/images/Symbols/Shapes/BluePin1LargeB.png",
width:"24px",
height:"24px"
}
}))

waypointLayer.add(new Graphic({
geometry:point,
symbol:{
type:"text",
text:(index+1).toString(),
color:"white",
font:{
size:10,
weight:"bold"
},
yoffset:8
}
}))

})

}

// --------------------
// DRAW PLANNING LINE
// --------------------

function drawPlanningLine(){

planningLayer.removeAll()

if(missionPoints.length<2) return

planningLayer.add(new Graphic({
geometry:{
type:"polyline",
paths:[missionPoints.map(p=>[p.longitude,p.latitude])]
},
symbol:{
type:"simple-line",
color:"yellow",
width:3
}
}))

}

// --------------------
// UPLOAD MISSION
// --------------------

window.uploadMission=function(){

planningMode = false
missionLocked = true   

planningLayer.removeAll()
missionLayer.removeAll()

if(missionPoints.length<2) return

missionLayer.add(new Graphic({
geometry:{
type:"polyline",
paths:[missionPoints.map(p=>[p.longitude,p.latitude])]
},
symbol:{
type:"simple-line",
color:"red",
width:3
}
}))

}

})

</script>

</body>
</html>
